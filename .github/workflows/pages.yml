name: Publish research to GitHub Pages

# Builds the MkDocs Material site from reports/research/* and deploys to Pages.
# The driver scripts (_*.py) and trackers are excluded by tools/build_pages.py.

on:
  push:
    branches: [main]
    paths:
      - "reports/research/**"
      - "tools/build_pages.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Assemble docs/ + mkdocs.yml (fails if any code/driver leaks into docs/)
        run: python tools/build_pages.py
      - name: Build site
        run: |
          pip install mkdocs-material
          mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
