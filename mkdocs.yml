      - Observations (buy/sell): research/PSU-Bank_2026-06-06/01_observations.md
      - Glossary: research/PSU-Bank_2026-06-06/GLOSSARY.md
      - References: research/PSU-Bank_2026-06-06/references.md
      - Companies:
          - BANKBARODA: research/PSU-Bank_2026-06-06/BANKBARODA_equity_research.md
          - BANKINDIA: research/PSU-Bank_2026-06-06/BANKINDIA_equity_research.md
          - CANBK: research/PSU-Bank_2026-06-06/CANBK_equity_research.md
          - INDIANB: research/PSU-Bank_2026-06-06/INDIANB_equity_research.md
          - IOB: research/PSU-Bank_2026-06-06/IOB_equity_research.md
          - MAHABANK: research/PSU-Bank_2026-06-06/MAHABANK_equity_research.md
          - PNB: research/PSU-Bank_2026-06-06/PNB_equity_research.md
          - SBIN: research/PSU-Bank_2026-06-06/SBIN_equity_research.md
          - UCOBANK: research/PSU-Bank_2026-06-06/UCOBANK_equity_research.md
          - UNIONBANK: research/PSU-Bank_2026-06-06/UNIONBANK_equity_research.md
